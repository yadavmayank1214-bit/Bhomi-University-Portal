<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhomi University Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 37, 64, 0.8), rgba(10, 37, 64, 0.85)), 
                        url('images/banner.jpg.jpeg') no-repeat center center;
            background-size: cover;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .login-logo {
            height: 80px;
            margin-bottom: 20px;
        }
        .login-card h2 {
            color: var(--deep-blue);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-card p {
            color: var(--slate-gray);
            font-size: 13px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 12px;
            color: var(--deep-blue);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--sky-blue);
        }
        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            background: #fafafa;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: var(--sky-blue);
            background: var(--white);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--sky-blue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #0099cc;
        }
        .login-error {
            color: #d32f2f;
            font-size: 12px;
            font-weight: 500;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body class="login-body">

    <div class="login-card">
        <img src="images/bhomi.png.jpeg" alt="Bhomi University Logo" class="login-logo">
        <h2>University Portal</h2>
        <p>Enter your student account credentials to proceed</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="studentUser">STUDENT ID (USERNAME)</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="studentUser" placeholder="e.g., anshuman, riya, samar, mayank" required>
                </div>
            </div>

            <div class="form-group">
                <label for="studentPassword">PORTAL PASSWORD</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="studentPassword" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">Verify & Secure Access</button>
            <div id="errorMessage" class="login-error"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('studentUser').value.toLowerCase().trim();
            const password = document.getElementById('studentPassword').value;
            const errorDiv = document.getElementById('errorMessage');

            // Added 'mayank' directly to the validation system here
            const validStudents = ['anshuman', 'samar', 'riya', 'mayank'];

            if (validStudents.includes(username) && password === '123') {
                localStorage.setItem('currentUser', username);
                window.location.href = 'index.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = "Invalid credentials. (Hint: Use your student name with password '123')";
            }
        });
    </script>
</body>
</html>
